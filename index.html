<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - Stasiun Ketapang</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 10px; }
        
        .header { text-align: center; background: var(--primary); padding: 10px; border-radius: 5px; margin-bottom: 10px; }

        /* Container Emplasemen */
        .emplasemen-container {
            position: relative;
            width: 1200px; 
            height: 600px; 
            margin: auto;
            background-image: url('denah.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-color: white;
            border: 2px solid #555;
        }

        /* Slot Jalur Interaktif */
        .track-slot {
            position: absolute;
            background: rgba(0, 0, 0, 0.75); 
            border: 1px solid var(--secondary);
            border-radius: 2px;
            padding: 2px;
            display: flex;
            flex-direction: column; /* Label di atas, baris gerbong di bawah */
            gap: 2px;
            z-index: 10;
        }

        /* Baris Gerbong (Menyamping) */
        .unit-container {
            display: flex; /* Membuat urutan menyamping */
            flex-direction: row; 
            flex-wrap: nowrap; /* Jangan turun ke bawah */
            gap: 2px;
            overflow-x: auto; /* Jika terlalu panjang bisa di-scroll */
            padding-bottom: 2px;
        }

        .unit {
            background: #fff; color: #000; padding: 3px 8px;
            font-size: 10px; font-weight: bold; cursor: pointer;
            border-radius: 2px; text-align: center;
            white-space: nowrap; /* Teks gerbong tidak terpotong */
            border: 1px solid #999;
        }
        .unit.selected { background: var(--secondary); color: #fff; border-color: #fff; }

        .btn-move { font-size: 10px; cursor: pointer; background: var(--success); color: white; border: none; padding: 5px; font-weight: bold; border-radius: 3px; }
        
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; height: 100px; overflow-y: auto; margin-top: 10px; font-size: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="header">
    <strong>SIMULATOR KETAPANG (HORIZONTAL MODE)</strong> | 
    GERAKAN: <span id="moveCount">0</span> |
    <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:2px 10px; cursor:pointer;">Reset</button>
</div>

<div class="emplasemen-container" id="map"></div>

<div id="log">>>> Klik gerbong paling ujung (kanan) untuk langsir...</div>

<script>
    const trackConfigs = {
        /* Koordinat disesuaikan dengan posisi rel di gambar asli */
        "I":   { x: 525, y: 225, w: 300, cap: 14, units: ["K1 08610"] },
        "II":  { x: 545, y: 275, w: 325, cap: 15, units: ["K1 08611"] },
        "III": { x: 495, y: 325, w: 345, cap: 16, units: ["K1 08612"] },
        "IV":  { x: 420, y: 375, w: 370, cap: 15, units: ["K1 08613"] },
        "V":   { x: 350, y: 425, w: 400, cap: 15, units: ["K1 08614"] },
        "VI":  { x: 325, y: 475, w: 400, cap: 17, units: ["M1 09401", "P 06802", "4 KRT"] },
        
        "DIPO KRT 1": { x: 125, y: 35, w: 200, cap: 5, units: ["B 06604", "K3 09304"] },
        "DIPO KRT 2": { x: 125, y: 85, w: 200, cap: 7, units: ["K1 08618", "K1 00229"] },
        
        "CUCI 1": { x: 125, y: 135, w: 200, cap: 11, units: [] },
        "CUCI 2": { x: 125, y: 185, w: 200, cap: 11, units: [] }
    };

    let selectedUnit = null;
    let fromTrack = null;
    let moveCount = 0;

    function render() {
        const map = document.getElementById('map');
        map.innerHTML = '';

        for (const [name, data] of Object.entries(trackConfigs)) {
            const slot = document.createElement('div');
            slot.className = 'track-slot';
            slot.style.left = data.x + 'px';
            slot.style.top = data.y + 'px';
            slot.style.width = data.w + 'px';

            // Judul Jalur & Tombol Masuk
            const topBar = document.createElement('div');
            topBar.style.display = 'flex';
            topBar.style.justifyContent = 'space-between';
            topBar.innerHTML = `<span style="font-size:10px; font-weight:bold">${name}</span>
                               <button class="btn-move" onclick="move('${name}')">MASUK</button>`;
            
            // Container Gerbong (Menyamping)
            const unitCont = document.createElement('div');
            unitCont.className = 'unit-container';
            
            data.units.forEach((u, i) => {
                const unitDiv = document.createElement('div');
                const isSelected = (selectedUnit === u && fromTrack === name && i === data.units.length - 1);
                unitDiv.className = `unit ${isSelected ? 'selected' : ''}`;
                unitDiv.innerText = u;
                unitDiv.onclick = () => select(name, i);
                unitCont.appendChild(unitDiv);
            });

            slot.appendChild(topBar);
            slot.appendChild(unitCont);
            map.appendChild(slot);
        }
        document.getElementById('moveCount').innerText = moveCount;
    }

    function select(track, idx) {
        // Logika Langsir: Hanya bisa ambil dari ujung (paling kanan)
        if (idx !== trackConfigs[track].units.length - 1) {
            addLog("INFO: Hanya gerbong paling ujung yang bisa ditarik!");
            return;
        }
        selectedUnit = trackConfigs[track].units[idx];
        fromTrack = track;
        render();
    }

    function move(target) {
        if (!selectedUnit || target === fromTrack) return;
        if (trackConfigs[target].units.length >= trackConfigs[target].cap) {
            addLog(`ALARM: Jalur ${target} Penuh!`, "danger");
            return;
        }
        trackConfigs[fromTrack].units.pop();
        trackConfigs[target].units.push(selectedUnit);
        moveCount++;
        addLog(`MOVE: ${selectedUnit} (${fromTrack} -> ${target})`);
        selectedUnit = null; fromTrack = null;
        render();
    }

    function addLog(m, type="") {
        const l = document.getElementById('log');
        const color = type === "danger" ? "red" : "#0f0";
        l.innerHTML += `<div style="color:${color}">> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    render();
</script>
</body>
</html>
